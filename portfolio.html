<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0">
    <script src="https://kit.fontawesome.com/a505f3efe0.js" crossorigin="anonymous"></script>

</head>

<body>
    <div class="container">
        <h1 class="sub-title">My Work</h1>
        <div class="container-slide">
            <div class="slider-wrapper">
                <button id="prev-slide" class="slide-button material-symbols-rounded">
                    chevron_left
                </button>
                <ul class="image-list">
                    <li class="image-item">
                        <div class="image-overlay">
                            <h2>Social Media App</h2>
                            <a href="#"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                        </div>
                        <img class="image" src="images/work-1.png" alt="img-1" />
                    </li>
                    <li class="image-item">
                        <div class="image-overlay">
                            <h2>E-commerce Website</h2>
                            <a href="#"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                        </div>
                        <img class="image" src="images/work-4.png" alt="E-commerce Website" />
                    </li>
                    <li class="image-item">
                        <div class="image-overlay">
                            <h2>Portfolio Website</h2>

                            <a href="#"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                        </div>
                        <img class="image" src="images/work-5.png" alt="Portfolio Website" />
                    </li>
                    <li class="image-item">
                        <div class="image-overlay">
                            <h2>Travel Blog Website</h2>
                            <a href="#"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                        </div>
                        <img class="image" src="images/work-6.png" alt="Travel Blog Website" />
                    </li>
                    <li class="image-item">
                        <div class="image-overlay">
                            <h2>Online Learning Platform</h2>
                            <a href="#"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                        </div>
                        <img class="image" src="images/work-7.png" alt="Online Learning Platform" />
                    </li>
                    <li class="image-item">
                        <div class="image-overlay">
                            <h2>Recipe Sharing App</h2>
                            <a href="#"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                        </div>
                        <img class="image" src="images/work-8.png" alt="Recipe Sharing App" />
                    </li>
                    <li class="image-item">
                        <div class="image-overlay">
                            <h2>Travel App</h2>
                            <a href="#"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                        </div>
                        <img class="image" src="images/work-9.png" alt="Travel App" />
                    </li>
                    <li class="image-item">
                        <div class="image-overlay">
                            <h2>Fitness Tracker</h2>
                            <a href="#"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                        </div>
                        <img class="image" src="images/work-10.png" alt="Fitness Tracker" />
                    </li>

                </ul>
                <button id="next-slide" class="slide-button material-symbols-rounded">
                    chevron_right
                </button>
            </div>
            <div class="slider-scrollbar">
                <div class="scrollbar-track">
                    <div class="scrollbar-thumb"></div>
                </div>
            </div>
        </div>
        <a href="#" class="btn">See more</a>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
